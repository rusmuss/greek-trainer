<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Greek Trainer</title>
<link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700&f[]=zodiak@500,700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f7f6f2;--surface:#f9f8f5;--surface2:#f0efeb;--border:#d4d1ca;
  --text:#28251d;--muted:#7a7974;--primary:#01696f;--primary-h:#0c4e54;
  --ok:#167347;--err:#b64235;--text-inv:#f9f8f4;--radius:.75rem;--radiusX:1rem;
  --font:'Satoshi',system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;--fdisplay:'Zodiak',Georgia,serif;
}
[data-theme=dark]{--bg:#171614;--surface:#1c1b19;--surface2:#201f1d;--border:#393836;--text:#cdccca;--muted:#97958f;--primary:#4f98a3;--primary-h:#227f8b;--text-inv:#171614;--ok:#5bc989;--err:#ff7568}
*{box-sizing:border-box}
html{scroll-behavior:smooth}
body{margin:0;font-family:var(--font);font-size:1rem;line-height:1.6;background:var(--bg);color:var(--text)}
button,input,select{font:inherit}
button{cursor:pointer}
.wrap{max-width:1200px;margin:0 auto;padding:1.5rem}
header{position:sticky;top:0;z-index:5;padding:1rem 0;background:linear-gradient(var(--bg) 78%,rgba(247,246,242,0));backdrop-filter:blur(10px)}
[data-theme=dark] header{background:linear-gradient(var(--bg) 78%,rgba(23,22,20,0))}
.topbar{display:flex;justify-content:space-between;align-items:center;gap:1rem;flex-wrap:wrap}
.logo{font-weight:700;font-size:1.05rem;display:flex;align-items:center;gap:.55rem}
.logo svg{width:30px;height:30px;flex:none}
.navbtns{display:flex;gap:.5rem;flex-wrap:wrap}
.btn{border:1px solid var(--border);background:var(--surface);padding:.65rem 1rem;border-radius:999px;color:var(--text);font-size:.9rem;text-decoration:none}
.btn:hover{background:var(--surface2)}
.btn.primary,.btn.active{background:var(--primary);color:var(--text-inv);border-color:transparent}
.btn.primary:hover,.btn.active:hover{background:var(--primary-h)}
main{padding:1rem 0 3rem}
.hero{padding:2.5rem 0 1.5rem}
.pill{display:inline-block;padding:.2rem .7rem;border-radius:999px;background:rgba(1,105,111,.1);color:var(--primary);font-size:.85rem;margin-bottom:.75rem}
h1{font-family:var(--fdisplay);font-size:clamp(2.2rem,5vw,4.2rem);line-height:1.05;margin:0 0 .6rem}
h2{font-family:var(--fdisplay);font-size:clamp(1.45rem,2.5vw,2.05rem);line-height:1.2;margin:0 0 1rem}
h3{font-family:var(--fdisplay);font-size:1.25rem;line-height:1.25;margin:0 0 .75rem}
.lead{color:var(--muted);max-width:70ch;margin:0 0 1.5rem}
section{padding:1.25rem 0}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--radiusX);padding:1.25rem;margin-bottom:1rem}
.lesson-page{display:none}
.lesson-page.active{display:block}
.controls{display:flex;gap:.75rem;flex-wrap:wrap;align-items:center;margin-top:1rem}
.muted{color:var(--muted)}
.two-col{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:1rem}
.rule-list{margin:0;padding-left:1.15rem;display:grid;gap:.45rem}
.table-wrap{overflow:auto;border:1px solid var(--border);border-radius:var(--radius);background:var(--surface)}
table{width:100%;border-collapse:collapse;min-width:520px}
th,td{border-bottom:1px solid var(--border);border-right:1px solid var(--border);padding:.65rem .75rem;text-align:left;vertical-align:top}
tr:last-child td{border-bottom:0}
th:last-child,td:last-child{border-right:0}
th{font-weight:700;background:var(--surface2)}
.greek{font-family:var(--fdisplay);font-size:1.12em}
.word-list{columns:2;column-gap:2rem;margin:.5rem 0 0;padding-left:1.3rem}
.word-list li{break-inside:avoid;margin:.15rem 0}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:1rem}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radiusX);padding:1rem;display:flex;flex-direction:column;gap:.45rem}
.card.hidden{display:none}
.letter-big{font-family:var(--fdisplay);font-size:3.5rem;line-height:1;color:var(--primary)}
.letter-small{font-size:.75em;color:var(--muted)}
.card-name{font-weight:700;font-size:1.05rem}
.card-row{font-size:.9rem;color:var(--muted)}
.card-word strong{color:var(--text)}
.card-tip{font-size:.82rem;color:var(--muted);border-top:1px solid var(--border);padding-top:.4rem}
.speak{align-self:flex-start;padding:.4rem .8rem;border-radius:999px;border:1px solid var(--border);background:transparent;color:var(--text);font-size:.85rem;margin-top:.25rem}
.mini-speak{border:1px solid var(--border);background:var(--surface);color:var(--text);border-radius:999px;padding:.2rem .55rem;font-size:.82rem;line-height:1.2;white-space:nowrap}
.mini-speak:hover{background:var(--surface2)}
.audio-cell{width:1%;text-align:center;white-space:nowrap}
.alpha-pills{display:flex;flex-wrap:wrap;gap:.5rem;margin:1rem 0}
.alpha-pill{padding:.4rem .9rem;border-radius:999px;border:1px solid var(--border);background:var(--surface2);font-family:var(--fdisplay);font-size:1.1rem;transition:background .2s,color .2s,border-color .2s}
.alpha-pill.active{background:var(--primary);color:var(--text-inv);border-color:transparent}
.ex-row{display:flex;flex-wrap:wrap;gap:.4rem .6rem;align-items:center;font-family:var(--fdisplay);font-size:1.35rem;margin:1rem 0;line-height:2}
.ex-input{width:2.3rem;height:2.3rem;text-align:center;border:2px solid var(--border);border-radius:.45rem;background:var(--surface2);color:var(--text);font-family:var(--fdisplay);font-size:1.25rem;padding:0}
.ex-input.wide{width:4.4rem;font-family:var(--font);font-size:1rem}
.ex-input.ok{border-color:var(--ok)}
.ex-input.err{border-color:var(--err)}
.exercise-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:.75rem;margin:1rem 0}
.exercise-item{display:flex;align-items:center;gap:.45rem;background:var(--surface2);padding:.75rem 1rem;border-radius:var(--radius);border:1px solid var(--border)}
.exercise-num{color:var(--muted);font-size:.85rem;min-width:1.5rem}
.result-text{color:var(--muted);font-size:.9rem}
.classify-board{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:1rem;margin-top:1rem}
.drop-row{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:1rem}
.drop-row strong{display:block;margin-bottom:.65rem}
.choice-bank{display:flex;flex-wrap:wrap;gap:.5rem;margin:1rem 0}
.choice{border:1px solid var(--border);background:var(--surface);border-radius:999px;padding:.35rem .75rem}
.choice.selected{background:var(--primary);color:var(--text-inv);border-color:transparent}
.choice.ok{outline:2px solid var(--ok)}
.choice.err{outline:2px solid var(--err)}
.badge{display:inline-flex;align-items:center;gap:.35rem;border-radius:999px;background:var(--surface2);border:1px solid var(--border);padding:.25rem .6rem;margin:.15rem .2rem .15rem 0}
footer{padding:2rem 0 3rem;color:var(--muted);font-size:.9rem;border-top:1px solid var(--border)}
@media (max-width:680px){
  .wrap{padding:1rem}
  header{position:static}
  .navbtns{width:100%;overflow:auto;flex-wrap:nowrap;padding-bottom:.25rem}
  .btn{white-space:nowrap}
  .word-list{columns:1}
}
@media print{
  header,.controls,.speak,footer{display:none!important}
  .wrap{max-width:none;padding:0}
  .lesson-page{display:none!important}
  .lesson-page.active{display:block!important}
  #print-cards{display:grid!important;grid-template-columns:repeat(2,1fr);gap:8mm}
  .print-card{break-inside:avoid;border:2px solid #222;border-radius:10px;padding:12px;background:#fff;color:#000;min-height:80px}
  .print-letter{font-size:2.5rem;font-family:serif}
}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="topbar">
      <div class="logo">
        <svg viewBox="0 0 64 64" fill="none" aria-hidden="true"><path d="M10 48L32 10l22 38" stroke="currentColor" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/><path d="M20 34h24" stroke="currentColor" stroke-width="5" stroke-linecap="round"/></svg>
        Greek Trainer
      </div>
      <nav class="navbtns" id="lessonNav" aria-label="Уроки"></nav>

  <main id="app"></main>

<script>
const letters = [

  {upper:'Ε',lower:'ε',name:'έψιλον',ipa:'/e/',approx:'[Э]',word:'Ελλάδα',translation:'Греция',tip:'Короткий чистый э.'},

  {upper:'Ι',lower:'ι',name:'ιώτα',ipa:'/i/',approx:'[И]',word:'Ιταλία',translation:'Италия',tip:'Чистый и.'},

  {upper:'Τ',lower:'τ',name:'ταυ',ipa:'/t/',approx:'[Т]',word:'τραπέζι',translation:'стол',tip:'Твёрдый т.'},

  {upper:'Χ',lower:'χ',name:'χι',ipa:'/x/',approx:'[Х]',word:'χώρα',translation:'страна',tip:'Горловой х.'},
  {upper:'Ψ',lower:'ψ',name:'ψι',speech:'ψί',ipa:'/ps/',approx:'[ПС]',word:'ψάρι',translation:'рыба',tip:'Сразу п+с.'},
  {upper:'Ω',lower:'ω',name:'ωμέγα',ipa:'/o/',approx:'[О]',word:'ώρα',translation:'время',tip:'Звучит как о, как ο.'}

const alpha = letters.map(letter => letter.lower.split('/')[0]);

const lessons = [
  {
    id:'lesson-1',
    label:'Урок 1',
    tag:'24 буквы • произношение • аудио • упражнения',
    title:'Греческий алфавит',
    lead:'Карточки с произношением, порядковое аудио и интерактивные упражнения из первого урока.',
    sections:[

      {type:'alphabetPlayer'},
      {type:'lesson1Exercises'},
      {type:'printCards'},

    ]
  },
  {
    id:'lesson-2',
    label:'Урок 2',
    tag:'Гласные • ударение • буквосочетания',
    title:'Гласные звуки',
    lead:'Гласные звуки в греческом языке можно соотнести с соответствующими русскими звуками.',
    sections:[
      {type:'table',title:'Гласные буквы',headers:['буква','название','произношение'],rows:[

      {type:'text',paragraphs:[

        'Ударение в словах отображается на письме. В буквосочетании из двух гласных ударение ставится на второй букве: αί, εί, οί, αύ, εύ, ού. Если ударение падает на первую букву сочетания, каждая буква читается отдельно.'
      ]},
      {type:'table',title:'Буквосочетания гласных',headers:['сочетание','чтение','пример'],rows:[

      ]},
      {type:'read',title:'2.1. Прочитайте буквы и буквосочетания',items:['υ','ο','αι','ευ','ι','α','ου','οι','αυ','ε','ει','ω','η']},
      {type:'classify',title:'2.2. Разнесите буквы по соответствующим строкам таблицы',groups:[{label:'[И]',answers:['ι','υ','η']},{label:'[О]',answers:['ω','ο']}],choices:['ι','ω','ο','υ','η']},
      {type:'readWords',title:'2.3. Прочитайте слова, обращая внимание на произношение гласных',items:['αυτοκίνητο','αστέρι','πολύ','φράουλα','πρόβλημα','αγάπη','εδώ','μαμά','μητέρα','ναί','παρακαλώ','πατέρας','πάω','σελίδα','ποτήρι','σερβιτόρος','τυρί','τώρα','φίλε','πρωί']}
    ]

  {
    id:'lesson-3',
    label:'Урок 3',
    tag:'Согласные • сочетания • чтение слов',
    title:'Согласные звуки',
    lead:'Греческие согласные в основном можно соотнести с соответствующими русскими согласными звуками.',
    sections:[
      {type:'table',title:'Согласные буквы',headers:['буква','название','произношение'],rows:[
        ['Β β','вита / βήτα','[В]'],['Γ γ','гамма / γάμμα','как белорусская [Г]; [Й] перед е/и'],['Δ δ','дельта / δέλτα','[Д]'],['Ζ ζ','зита / ζήτα','[З]'],['Θ θ','θита / θήτα','[Θ]'],['Κ κ','каппа / κάππα','[К]'],['Λ λ','лямда / λάμδα','[Л]'],['Μ μ','ми / μι','[М]'],['Ν ν','ни / νι','[Н]'],['Ξ ξ','кси / ξι','[КС]'],['Π π','пи / πι','[П]'],['Ρ ρ','ро / ρω','[Р]'],['Σ σ ς','сигма / σίγμα','[С]'],['Τ τ','тав / ταυ','[Т]'],['Φ φ','фи / φι','[Ф]'],['Χ χ','хи / χι','[Х]'],['Ψ ψ','пси / ψι','[ПС]']
      ]},

        ['ντ','[Д] в начале слова; [НД] в середине','ντομάτα [ДОМАТА] — помидор; μοντέρνο [МОНДЕРНО] — современный'],

      {type:'read',title:'3.1. Прочитайте буквы и буквосочетания',items:['Ψ ψ','Ν ν','Λ λ','γχ','Δ δ','Σ σ ς','Χ χ','ντ','τζ','Ρ ρ','Π π','Ζ ζ','Γ γ','μπ','Κ κ','γγ','γκ','Φ φ','Μ μ','τσ','Ξ ξ','Τ τ','Θ θ']},
      {type:'readWords',title:'3.2. Потренируйтесь в чтении греческих слов',items:['αδελφός','εγώ','πρωινό','αδελφή','κόρη','ελπίδα','χρήματα','σύσκεψη','φυσικά','ζωή','κλέφτης','πόσο','αμέσως','σκουλαρίκι','μπαμπάς','πως','αυτό','ξέρω','άνευ','εικόνα']},
      {type:'classify',title:'3.3. Разнесите буквы по соответствующим строкам таблицы',groups:[{label:'гласные',answers:['ω','υ','α','η','ο','ε','ι']},{label:'согласные',answers:['θ','κ','δ','ν','ψ','λ','τ','β','φ','ρ','ξ','χ','σ','γ','ζ','π']}],choices:['θ','ω','κ','δ','ν','υ','ψ','λ','τ','β','φ','α','ρ','ξ','η','χ','σ','ο','γ','ζ','ε','ι','π']}
    ]
  },
  {
    id:'lesson-4',
    label:'Урок 4',
    tag:'Ξ ξ • Ζ ζ • словарь',
    title:'Буквы Ξ ξ и Ζ ζ',
    lead:'Буква Ξ ξ передаёт звук [КС], а буква Ζ ζ — звук [З]. Строчные ξ и ζ похожи, поэтому их важно не путать.',
    sections:[
      {type:'text',paragraphs:[
        'Для человека, владеющего русским языком, изучать греческий будет не слишком сложно — главное научиться правильно читать и писать греческие буквы.',

function escapeHtml(value){
  return String(value).replace(/[&<>"']/g, char => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[char]));
}
function greek(value){ return '<span class="greek">'+escapeHtml(value)+'</span>'; }
function speechText(value){
  const normalized = String(value).trim();
  if(normalized.startsWith('Ψ ψ') || normalized === 'ψ' || normalized === 'Ψ') return 'ψί';
  if(normalized.startsWith('Ξ ξ') || normalized === 'ξ' || normalized === 'Ξ') return 'ξί';
  return String(value)
    .split('—')[0]
    .split('/')[0]
    .replace(/\[[^\]]+\]/g, '')
    .replace(/\([^)]+\)/g, '')
    .replace(/[Α-Ω]\s+(?=[α-ωάέήίόύώϊϋΐΰ])/g, '')
    .trim();
}
function audioButton(value, label = '🔊'){
  return '<button type="button" class="mini-speak" data-speak-text="'+escapeHtml(speechText(value))+'" title="Прослушать">'+label+'</button>';
}
function speak(parts, btn){
  if(!('speechSynthesis' in window)){ alert('Синтез речи не поддерживается.'); return; }
  const originalLabel = btn ? btn.textContent : '';
  if(btn) btn.textContent='⏸ играет';
  const voices = window.speechSynthesis.getVoices();
  const greekVoice = voices.find(voice => voice.lang && voice.lang.toLowerCase().startsWith('el')) || null;
  let index = 0;
  function next(){
    if(index >= parts.length){ if(btn) btn.textContent=originalLabel; return; }
    const utterance = new SpeechSynthesisUtterance(parts[index]);
    utterance.lang='el-GR'; utterance.rate=.78; utterance.pitch=1; utterance.volume=1;
    if(greekVoice) utterance.voice = greekVoice;
    utterance.onend = () => setTimeout(next, index === 1 ? 700 : 150);
    utterance.onerror = () => { if(btn) btn.textContent=originalLabel; };
    index++;
    window.speechSynthesis.speak(utterance);
  }
  window.speechSynthesis.cancel();
  if(voices.length) next();
  else window.speechSynthesis.addEventListener('voiceschanged', next, {once:true});
}
function input(answer, wide = false){
  return '<input class="ex-input '+(wide ? 'wide' : '')+'" maxlength="'+(wide ? 8 : 2)+'" data-answer="'+escapeHtml(answer.toLowerCase())+'" aria-label="Ответ">';

function checkInputs(scope, resultId){
  const inputs = document.querySelectorAll(scope+' .ex-input');
  let ok = 0;
  inputs.forEach(item => {
    const value = item.value.trim().toLowerCase();
    item.classList.remove('ok','err');
    if(value === item.dataset.answer){ item.classList.add('ok'); ok++; }
    else item.classList.add('err');
  });
  document.getElementById(resultId).textContent = ok+' из '+inputs.length+' верно';
}
function resetInputs(scope, resultId){
  document.querySelectorAll(scope+' .ex-input').forEach(item => {
    item.value = '';
    item.classList.remove('ok','err');
  });
  document.getElementById(resultId).textContent = '';
}

function showLesson(id){
  activeLessonId = lessons.some(lesson => lesson.id === id) ? id : 'lesson-1';
  document.querySelectorAll('.lesson-page').forEach(page => page.classList.toggle('active', page.id === activeLessonId));
  document.querySelectorAll('[data-lesson]').forEach(btn => btn.classList.toggle('active', btn.dataset.lesson === activeLessonId));
  history.replaceState(null, '', '#'+activeLessonId);
  window.speechSynthesis?.cancel();
  playing = false;
  window.scrollTo({top:0, behavior:'smooth'});
}
function highlightPill(index){
  document.querySelectorAll('.alpha-pill').forEach((pill, pillIndex) => pill.classList.toggle('active', pillIndex === index));
}
function playFrom(index){
  if(!playing || index >= letters.length){
    if(looping && playing){ playFrom(0); return; }
    highlightPill(-1);
    const status = document.getElementById('alphaStatus');
    if(status) status.textContent = index >= letters.length ? 'Готово!' : '';
    playing = false;
    return;
  }
  const letter = letters[index];
  const status = document.getElementById('alphaStatus');
  if(status) status.textContent = letter.upper+' '+letter.lower+' — '+letter.name;
  highlightPill(index);
  speak([letter.speech || letter.name], null);
  alphaTimer = setTimeout(() => playFrom(index + 1), 1250);
}
function bindEvents(){
  nav.addEventListener('click', event => {
    const lessonBtn = event.target.closest('[data-lesson]');
    if(lessonBtn) showLesson(lessonBtn.dataset.lesson);
  });
  document.addEventListener('click', event => {
    const themeBtn = event.target.closest('[data-theme-toggle]');
    if(themeBtn){
      const root = document.documentElement;
      root.setAttribute('data-theme', root.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
    }
    const speakBtn = event.target.closest('[data-speak-letter]');
    if(speakBtn){
      const letter = letters[Number(speakBtn.dataset.speakLetter)];
      speak([letter.speech || letter.name, letter.word], speakBtn);
    }
    const speakTextBtn = event.target.closest('[data-speak-text]');
    if(speakTextBtn){
      speak([speakTextBtn.dataset.speakText], speakTextBtn);
    }
    const checkBtn = event.target.closest('[data-check-inputs]');
    if(checkBtn) checkInputs(checkBtn.dataset.checkInputs, checkBtn.dataset.result);
    const resetBtn = event.target.closest('[data-reset-inputs]');
    if(resetBtn) resetInputs(resetBtn.dataset.resetInputs, resetBtn.dataset.result);
    const choiceBtn = event.target.closest('.choice');
    if(choiceBtn) choiceBtn.classList.toggle('selected');
    const classifyCheck = event.target.closest('[data-check-classify]');
    if(classifyCheck){
      const scope = document.getElementById(classifyCheck.dataset.checkClassify);
      const selected = scope.querySelectorAll('.choice.selected');
      let ok = 0;
      selected.forEach(choice => {
        choice.classList.remove('ok','err');
        if(choice.dataset.answer === '1'){ choice.classList.add('ok'); ok++; }
        else choice.classList.add('err');
      });
      const total = scope.querySelectorAll('.choice[data-answer="1"]').length;
      document.getElementById(classifyCheck.dataset.result).textContent = ok+' из '+total+' верно выбрано';
    }
    const classifyReset = event.target.closest('[data-reset-classify]');
    if(classifyReset){
      const scope = document.getElementById(classifyReset.dataset.resetClassify);
      scope.querySelectorAll('.choice').forEach(choice => choice.classList.remove('selected','ok','err'));
      document.getElementById(classifyReset.dataset.result).textContent = '';
    }
    if(event.target.id === 'shuffleBtn'){
      const grid = document.getElementById('cardGrid');
      const cards = [...grid.querySelectorAll('.card')];
      for(let index = cards.length - 1; index > 0; index--){
        const swapIndex = Math.floor(Math.random() * (index + 1));
        [cards[index], cards[swapIndex]] = [cards[swapIndex], cards[index]];
      }
      cards.forEach(card => grid.appendChild(card));
    }
    if(event.target.id === 'hideHintsBtn'){
      hintsHidden = !hintsHidden;
      document.querySelectorAll('.card-row,.card-tip,.card-word').forEach(item => item.style.visibility = hintsHidden ? 'hidden' : 'visible');
      event.target.textContent = hintsHidden ? 'Показать подсказки' : 'Скрыть подсказки';
    }
    if(event.target.id === 'playAll'){
      if(alphaTimer) clearTimeout(alphaTimer);
      window.speechSynthesis?.cancel();
      playing = true;
      playFrom(0);
    }
    if(event.target.id === 'loopBtn'){
      looping = !looping;
      event.target.textContent = looping ? '🔁 Зациклить: вкл' : '🔁 Зациклить: выкл';
      event.target.classList.toggle('active', looping);
    }
    if(event.target.id === 'stopBtn'){
      playing = false;
      looping = false;
      if(alphaTimer) clearTimeout(alphaTimer);
      window.speechSynthesis?.cancel();
      highlightPill(-1);
      const loopBtn = document.getElementById('loopBtn');
      const status = document.getElementById('alphaStatus');
      if(loopBtn){ loopBtn.textContent = '🔁 Зациклить: выкл'; loopBtn.classList.remove('active'); }
      if(status) status.textContent = 'Остановлено';
    }
  });
  document.addEventListener('input', event => {
    if(event.target.id === 'search'){
      const query = event.target.value.toLowerCase();
      document.querySelectorAll('#cardGrid .card').forEach(card => card.classList.toggle('hidden', query && !card.textContent.toLowerCase().includes(query)));
    }
  });
}
function initTheme(){
  const preferred = matchMedia('(prefers-color-scheme:dark)').matches ? 'dark' : 'light';
  document.documentElement.setAttribute('data-theme', preferred);
}

initTheme();
renderNav();
renderLessons();
bindEvents();
showLesson(activeLessonId);
</script>
</body>
</html>
